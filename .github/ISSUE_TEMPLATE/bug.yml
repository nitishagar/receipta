name: Bug report
description: Report something that isn't working as expected
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. If this is security-sensitive, please
        follow [SECURITY.md](../../SECURITY.md) instead of opening a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior. Include the smallest reproduction you can.
      placeholder: 'When I run `receipta verify …`, I expected … but got …'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: The behavior you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: receipta version
      description: 'Output of `receipta --help` or the installed `@receipta/*` version.'
      placeholder: '0.2.0'
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: '22.x'
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - '@receipta/core'
        - '@receipta/cli'
        - '@receipta/openai'
        - '@receipta/anthropic'
        - '@receipta/vercel'
        - docs / other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / receipts
      description: Verbatim command output, verification reports, or a sanitized receipt. Avoid pasting private keys.
      render: shell

# CI — lint, format check, typecheck, coverage, build, verify:demo, docs build on every PR and push.
# Frozen-lockfile installs for reproducibility (S5.5). Node 22/24 matrix: the repo pins pnpm@11.4.0,
# which requires Node >=22.13, so Node 20 is not a supported runtime despite the historical >=20 claim.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Coverage (with enforced thresholds)
        run: pnpm coverage

      - name: Verify demo (S8 — tamper-detection acceptance test)
        run: pnpm verify:demo

      - name: Quickstart example (end-to-end, no network)
        run: pnpm example

      - name: Build docs
        run: pnpm docs:build

# Publish packages to npm with provenance attestations on version tags.
#
# Publishing model: this workflow authenticates to npm with a long-lived NPM_TOKEN secret (the
# `NODE_AUTH_TOKEN` env below). npm `--provenance` is enabled, which attaches a Sigstore/SLSA
# attestation derived from the GitHub Actions OIDC token (the `id-token: write` permission).
#
# NOTE on trusted publishing: npm's full "trusted publishing" flow (where npm exchanges the OIDC
# token for a short-lived publish token, removing the need for NPM_TOKEN entirely) is NOT yet
# configured for the @receipta scope — it requires per-package setup in the npm UI. Until that
# setup is done, this workflow relies on NPM_TOKEN. See CONTRIBUTING.md "Releasing" for the manual
# npm-UI steps to migrate to trusted publishing.
#
# Fallback: per-package `npm publish --provenance` runs if `pnpm -r publish` errors (verified
# necessary — pnpm's aggregated publish sometimes surfaces a provenance error that the per-package
# path does not).
name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter=./packages/* run build

      - name: Publish with provenance (pnpm)
        run: pnpm -r publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Fallback: if pnpm -r publish errors on provenance, publish per-package.
      - name: Publish with provenance (per-package fallback)
        if: failure()
        run: |
          status=0
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              (cd "$pkg" && npm publish --access public --provenance --tolerate-republish) || status=1
            fi
          done
          exit $status
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
